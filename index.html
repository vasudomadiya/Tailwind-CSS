<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vasu — Login</title>
    <link rel="stylesheet" href="src/output.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .input-field {
            width: 100%;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 11px 14px 11px 42px;
            font-size: 14px;
            outline: none;
            background: #f9fafb;
            color: #111827;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #764ba2;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.12);
        }

        .input-field::placeholder {
            color: #9ca3af;
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.45);
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }
    </style>
</head>

<body class="min-h-screen gradient-bg flex flex-col">

    <!-- ========== NAVBAR ========== -->
    <nav class="w-full px-8 py-4 flex items-center justify-between">

        <div class="text-white text-xl font-bold tracking-wide">✦ Vasu</div>

        <ul class="hidden md:flex items-center gap-8 text-sm text-white/80 font-medium">
            <li><a href="#" class="hover:text-white transition">Home</a></li>
            <li><a href="#" class="hover:text-white transition">About</a></li>
            <li><a href="#" class="hover:text-white transition">Contact</a></li>
        </ul>

        <a href="register.html"
            class="text-sm text-white border border-white/40 px-5 py-2 rounded-full hover:bg-white hover:text-purple-700 transition font-medium">
            Sign Up
        </a>

    </nav>

    <!-- ========== MAIN ========== -->
    <main class="flex-1 flex items-center justify-center px-4 py-10">

        <!-- Login Card -->
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">

            <!-- Card Top Banner -->
            <div class="gradient-bg px-8 py-7 text-center">

                <!-- Avatar Upload Box -->
                <div class="relative w-20 h-20 mx-auto mb-3">
                    <div id="avatar-preview"
                        class="w-20 h-20 rounded-full bg-white/20 border-2 border-white/50 flex items-center justify-center overflow-hidden">
                        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <label for="avatar-upload"
                        class="absolute bottom-0 right-0 w-6 h-6 bg-white rounded-full flex items-center justify-center cursor-pointer shadow-md hover:scale-110 transition">
                        <svg class="w-3.5 h-3.5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </label>
                    <input id="avatar-upload" type="file" accept="image/*" class="hidden"
                        onchange="previewAvatar(event)" />
                </div>

                <h1 class="text-white text-2xl font-bold">Welcome Back</h1>
                <p class="text-white/70 text-sm mt-1">Sign in to continue to your account</p>
            </div>

            <!-- Card Body -->
            <div class="px-8 py-8">

                <!-- Social Buttons -->
                <div class="flex gap-3 mb-6">
                    <button class="social-btn">
                        <svg class="w-4 h-4" viewBox="0 0 24 24">
                            <path fill="#4285F4"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="#EA4335"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Google
                    </button>
                    <button class="social-btn">
                        <svg class="w-4 h-4" fill="#1877F2" viewBox="0 0 24 24">
                            <path
                                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                        </svg>
                        Facebook
                    </button>
                </div>

                <!-- Divider -->
                <div class="flex items-center gap-3 mb-6">
                    <div class="flex-1 h-px bg-gray-200"></div>
                    <span class="text-xs text-gray-400 font-medium tracking-wide">OR LOGIN WITH EMAIL</span>
                    <div class="flex-1 h-px bg-gray-200"></div>
                </div>

                <!-- Form -->
                <form novalidate>

                    <!-- Username -->
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">
                            Username
                        </label>
                        <div class="relative">
                            <span class="absolute top-1/2 -translate-y-1/2 left-3 text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </span>
                            <input
                                id="username"
                                type="text"
                                placeholder="Enter your username"
                                class="input-field" />
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mb-4">
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">
                            Email Address
                        </label>
                        <div class="relative">
                            <span class="absolute top-1/2 -translate-y-1/2 left-3 text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </span>
                            <input
                                id="email"
                                type="email"
                                placeholder="you@example.com"
                                class="input-field" />
                        </div>
                    </div>

                    <!-- Contact -->
                    <div class="mb-4">
                        <label for="contact" class="block text-sm font-semibold text-gray-700 mb-1.5">
                            Contact Number
                        </label>
                        <div class="relative">
                            <span class="absolute top-1/2 -translate-y-1/2 left-3 text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                </svg>
                            </span>
                            <input
                                id="contact"
                                type="tel"
                                placeholder="+1 (555) 000-0000"
                                class="input-field" />
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-5">
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">
                            Password
                        </label>
                        <div class="relative">
                            <span class="absolute top-1/2 -translate-y-1/2 left-3 text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </span>
                            <input
                                id="password"
                                type="password"
                                placeholder="Enter your password"
                                class="input-field" />
                            <span
                                onclick="togglePassword()"
                                class="absolute top-1/2 -translate-y-1/2 right-3 text-gray-400 cursor-pointer hover:text-purple-600 transition">
                                <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </span>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none">
                            <input type="checkbox" class="w-4 h-4 rounded accent-purple-600" />
                            Remember me
                        </label>
                        <a href="#" class="text-sm text-purple-600 font-medium hover:text-purple-800 transition">
                            Forgot password?
                        </a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-primary mb-4">
                        🔐 &nbsp; Login to Account
                    </button>

                    <!-- Divider -->
                    <div class="flex items-center gap-3 mb-4">
                        <div class="flex-1 h-px bg-gray-200"></div>
                        <span class="text-xs text-gray-400">or</span>
                        <div class="flex-1 h-px bg-gray-200"></div>
                    </div>

                    <!-- Create Account Button -->
                    <a href="register.html"
                        class="w-full block text-center py-3 rounded-xl border-2 border-purple-500 text-purple-600 font-semibold text-sm hover:bg-purple-50 transition">
                        ✨ &nbsp; Create New Account
                    </a>

                </form>

            </div>
            <!-- /Card Body -->

        </div>
        <!-- /Login Card -->

    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="text-center text-white/60 text-xs py-5">
        © 2025 Vasu. All rights reserved.
        &nbsp;·&nbsp;
        <a href="#" class="hover:text-white transition">Privacy Policy</a>
        &nbsp;·&nbsp;
        <a href="#" class="hover:text-white transition">Terms of Service</a>
    </footer>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
            } else {
                input.type = 'password';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
            }
        }

        function previewAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('avatar-preview').innerHTML =
                    `<img src="${e.target.result}" class="w-full h-full object-cover rounded-full" />`;
            };
            reader.readAsDataURL(file);
        }
    </script>

</body>

</html>
