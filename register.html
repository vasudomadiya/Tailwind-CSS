<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vasu — Create Account</title>
    <link rel="stylesheet" href="src/output.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .input-field {
            width: 100%;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 11px 14px 11px 42px;
            font-size: 14px;
            outline: none;
            background: #f9fafb;
            color: #111827;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #764ba2;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.12);
        }

        .input-field::placeholder {
            color: #9ca3af;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.45);
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .strength-bar {
            height: 4px;
            border-radius: 99px;
            transition: all 0.3s;
        }
    </style>
</head>

<body class="min-h-screen gradient-bg flex flex-col">

    <!-- ========== NAVBAR ========== -->
    <nav class="w-full px-8 py-4 flex items-center justify-between">

        <div class="text-white text-xl font-bold tracking-wide">✦ Vasu</div>

        <ul class="hidden md:flex items-center gap-8 text-sm text-white/80 font-medium">
            <li><a href="#" class="hover:text-white transition">Home</a></li>
            <li><a href="#" class="hover:text-white transition">About</a></li>
            <li><a href="#" class="hover:text-white transition">Contact</a></li>
        </ul>

        <a href="index.html"
            class="text-sm text-white border border-white/40 px-5 py-2 rounded-full hover:bg-white hover:text-purple-700 transition font-medium">
            Login
        </a>

    </nav>

    <!-- ========== MAIN ========== -->
    <main class="flex-1 flex items-center justify-center px-4 py-8">

        <!-- Registration Card -->
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden">

            <!-- Card Banner -->
            <div class="gradient-bg px-8 py-6 text-center">
                <div
                    class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3 border-2 border-white/40">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                    </svg>
                </div>
                <h1 class="text-white text-2xl font-bold">Create Account</h1>
                <p class="text-white/70 text-sm mt-1">Join us today — it's free!</p>
            </div>

            <!-- Card Body -->
            <div class="px-8 py-8">

                <!-- Social Sign Up -->
                <div class="flex gap-3 mb-6">
                    <button class="social-btn">
                        <svg class="w-4 h-4" viewBox="0 0 24 24">
                            <path fill="#4285F4"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="#EA4335"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Sign up with Google
                    </button>
                    <button class="social-btn">
                        <svg class="w-4 h-4" fill="#1877F2" viewBox="0 0 24 24">
                            <path
                                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                        </svg>
                        Facebook
                    </button>
                </div>

                <!-- Divider -->
                <div class="flex items-center gap-3 mb-6">
                    <div class="flex-1 h-px bg-gray-200"></div>
                    <span class="text-xs text-gray-400 font-medium tracking-wide">OR REGISTER WITH EMAIL</span>
                    <div class="flex-1 h-px bg-gray-200"></div>
                </div>

                <!-- Registration Form -->
                <form novalidate>

                    <!-- Row: First Name + Last Name -->
                    <div class="grid grid-cols-2 gap-4 mb-4">

                        <!-- First Name -->
                        <div>
                            <label for="firstname" class="block text-sm font-semibold text-gray-700 mb-1.5">
                                First Name
                            </label>
                            <div class="relative">
                                <span class="input-icon">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                    </svg>
                                </span>
                                <input
                                    id="firstname"
                                    type="text"
                                    placeholder="John"
                                    class="input-field" />
                            </div>
                        </div>

                        <!-- Last Name -->
                        <div>
                            <label for="lastname" class="block text-sm font-semibold text-gray-700 mb-1.5">
                                Last Name
                            </label>
                            <div class="relative">
                                <span class="input-icon">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                    </svg>
                                </span>
                                <input
                                    id="lastname"
                                    type="text"
                                    placeholder="Doe"
                                    class="input-field" />
                            </div>
                        </div>

                    </div>

                    <!-- Username -->
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">
                            Username
                        </label>
                        <div class="relative">
                            <span class="input-icon">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </span>
                            <input
                                id="username"
                                type="text"
                                placeholder="johndoe123"
                                class="input-field" />
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mb-4">
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">
                            Email Address
                        </label>
                        <div class="relative">
                            <span class="input-icon">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </span>
                            <input
                                id="email"
                                type="email"
                                placeholder="you@example.com"
                                class="input-field" />
                        </div>
                    </div>

                    <!-- Phone Number -->
                    <div class="mb-4">
                        <label for="phone" class="block text-sm font-semibold text-gray-700 mb-1.5">
                            Phone Number
                        </label>
                        <div class="relative">
                            <span class="input-icon">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                </svg>
                            </span>
                            <input
                                id="phone"
                                type="tel"
                                placeholder="+1 (555) 000-0000"
                                class="input-field" />
                        </div>
                    </div>

                    <!-- Row: Password + Confirm Password -->
                    <div class="grid grid-cols-2 gap-4 mb-2">

                        <!-- Password -->
                        <div>
                            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">
                                Password
                            </label>
                            <div class="relative">
                                <span class="input-icon">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                    </svg>
                                </span>
                                <input
                                    id="password"
                                    type="password"
                                    placeholder="Min. 8 characters"
                                    class="input-field"
                                    oninput="checkStrength(this.value)" />
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div>
                            <label for="confirm-password" class="block text-sm font-semibold text-gray-700 mb-1.5">
                                Confirm Password
                            </label>
                            <div class="relative">
                                <span class="input-icon">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                    </svg>
                                </span>
                                <input
                                    id="confirm-password"
                                    type="password"
                                    placeholder="Re-enter password"
                                    class="input-field" />
                            </div>
                        </div>

                    </div>

                    <!-- Password Strength Indicator -->
                    <div class="mb-5">
                        <div class="flex gap-1.5 mt-2" id="strength-bars">
                            <div class="strength-bar flex-1 bg-gray-200" id="bar1"></div>
                            <div class="strength-bar flex-1 bg-gray-200" id="bar2"></div>
                            <div class="strength-bar flex-1 bg-gray-200" id="bar3"></div>
                            <div class="strength-bar flex-1 bg-gray-200" id="bar4"></div>
                        </div>
                        <p class="text-xs text-gray-400 mt-1" id="strength-label">Password strength</p>
                    </div>

                    <!-- Gender -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Gender</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                                <input type="radio" name="gender" value="male" class="accent-purple-600" />
                                Male
                            </label>
                            <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                                <input type="radio" name="gender" value="female" class="accent-purple-600" />
                                Female
                            </label>
                            <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                                <input type="radio" name="gender" value="other" class="accent-purple-600" />
                                Other
                            </label>
                        </div>
                    </div>

                    <!-- Terms & Conditions -->
                    <div class="mb-6">
                        <label class="flex items-start gap-2.5 text-sm text-gray-600 cursor-pointer select-none">
                            <input type="checkbox" class="w-4 h-4 mt-0.5 accent-purple-600 rounded shrink-0" />
                            <span>
                                I agree to the
                                <a href="#" class="text-purple-600 font-semibold hover:underline">Terms of Service</a>
                                and
                                <a href="#" class="text-purple-600 font-semibold hover:underline">Privacy Policy</a>
                            </span>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-primary">
                        Create Account
                    </button>

                    <!-- Login Link -->
                    <p class="text-center text-sm text-gray-500 mt-5">
                        Already have an account?
                        <a href="index.html" class="text-purple-600 font-semibold hover:text-purple-800 transition">
                            Sign In
                        </a>
                    </p>

                </form>

            </div>
            <!-- /Card Body -->

        </div>
        <!-- /Registration Card -->

    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="text-center text-white/60 text-xs py-5">
        © 2025 Vasu. All rights reserved.
        &nbsp;·&nbsp;
        <a href="#" class="hover:text-white transition">Privacy Policy</a>
        &nbsp;·&nbsp;
        <a href="#" class="hover:text-white transition">Terms of Service</a>
    </footer>

    <!-- Password Strength Script -->
    <script>
        function checkStrength(value) {
            const bars = [
                document.getElementById('bar1'),
                document.getElementById('bar2'),
                document.getElementById('bar3'),
                document.getElementById('bar4'),
            ];
            const label = document.getElementById('strength-label');

            // Reset
            bars.forEach(b => b.style.background = '#e5e7eb');

            let score = 0;
            if (value.length >= 8) score++;
            if (/[A-Z]/.test(value)) score++;
            if (/[0-9]/.test(value)) score++;
            if (/[^A-Za-z0-9]/.test(value)) score++;

            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];

            for (let i = 0; i < score; i++) {
                bars[i].style.background = colors[score - 1];
            }

            label.textContent = value.length === 0 ? 'Password strength' : labels[score - 1];
            label.style.color = value.length === 0 ? '#9ca3af' : colors[score - 1];
        }
    </script>

</body>

</html>
